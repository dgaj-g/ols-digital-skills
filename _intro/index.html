<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OLS Digital Skills — Intro</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  body { font-family: Georgia, 'Times New Roman', serif; }
  #stage {
    width: 1920px;
    height: 1080px;
    position: relative;
    background: radial-gradient(ellipse at center, #1f4380 0%, #16315a 55%, #0d1f3d 100%);
  }
  /* Force exact pixel rendering — no DPR scaling */
  canvas { display: block; image-rendering: auto; }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="canvas" width="1920" height="1080"></canvas>
  <div class="vignette"></div>
</div>

<!-- Hidden crest source (decoded at startup) -->
<img id="crest-src" src="../assets/crest.png" crossorigin="anonymous" style="display:none" />

<script>
// ============================================================
// OLS Digital Skills — particle assembly intro
// 3 seconds @ 60fps = 180 frames
// ============================================================

// Seeded PRNG (mulberry32). REPLACES Math.random with a deterministic stream so
// every page load produces identical particle positions. CRITICAL for
// frame-by-frame capture — without this, every frame would have different
// particles and the animation would flicker.
(function () {
  let s = 0xC0DE0007 >>> 0;
  Math.random = function () {
    s |= 0;
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
})();

const W = 1920, H = 1080;
const DURATION_MS = 3000;
const FPS = 60;
const TOTAL_FRAMES = (DURATION_MS / 1000) * FPS; // 180

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Layout
const CREST_W = 460;             // rendered crest width on stage
const CREST_X = (W - CREST_W) / 2;
const CREST_Y = 200;             // top edge of crest
const TEXT_BASELINE_Y = 850;     // y for the main wordmark

// Tunables
const PARTICLE_COUNT_TARGET = 4200;
const PARTICLE_MIN_SIZE = 1.4;
const PARTICLE_MAX_SIZE = 3.2;

// Easing
const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
const easeInOutCubic = (t) => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
const clamp01 = (x) => Math.max(0, Math.min(1, x));
const lerp = (a, b, t) => a + (b - a) * t;

let particles = [];
let crestImgData = null;     // captured pixel data
let crestImage = null;       // the <img> element
let crestHeight = 0;

function buildParticles() {
  // Sample the crest's opaque pixels and create a particle per sampled pixel
  const off = document.createElement('canvas');
  off.width = CREST_W;
  // Maintain aspect ratio
  const ratio = crestImage.naturalHeight / crestImage.naturalWidth;
  crestHeight = Math.round(CREST_W * ratio);
  off.height = crestHeight;
  const octx = off.getContext('2d');
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = 'high';
  octx.drawImage(crestImage, 0, 0, off.width, off.height);
  const data = octx.getImageData(0, 0, off.width, off.height);
  crestImgData = data;

  // Count opaque pixels to set stride
  let opaqueCount = 0;
  for (let i = 3; i < data.data.length; i += 4) if (data.data[i] > 60) opaqueCount++;
  const stride = Math.max(1, Math.floor(opaqueCount / PARTICLE_COUNT_TARGET));

  const arr = [];
  let counter = 0;
  for (let y = 0; y < data.height; y++) {
    for (let x = 0; x < data.width; x++) {
      const idx = (y * data.width + x) * 4;
      const a = data.data[idx + 3];
      if (a < 60) continue;
      counter++;
      if (counter % stride !== 0) continue;

      const r = data.data[idx];
      const g = data.data[idx + 1];
      const b = data.data[idx + 2];

      // Target position on stage
      const tx = CREST_X + x + (Math.random() - 0.5) * 0.6;
      const ty = CREST_Y + y + (Math.random() - 0.5) * 0.6;

      // Start position: swirl around a centerpoint, far away
      const angle = Math.random() * Math.PI * 2;
      const radius = 700 + Math.random() * 600;
      const cx = W / 2, cy = H / 2 - 40;
      const sx = cx + Math.cos(angle) * radius;
      const sy = cy + Math.sin(angle) * radius * 0.7;

      // Per-particle timing window (so they don't all start/finish at once)
      const delay = Math.random() * 0.35;         // 0–35% of timeline before motion begins
      const duration = 0.45 + Math.random() * 0.25; // each particle's motion lasts 45–70% of timeline
      // Slight curvature: control point pulls toward center
      const ctrlAngle = Math.atan2(ty - sy, tx - sx) + (Math.random() - 0.5) * 1.4;
      const ctrlDist = 180 + Math.random() * 220;
      const ctrlX = (sx + tx) / 2 + Math.cos(ctrlAngle) * ctrlDist;
      const ctrlY = (sy + ty) / 2 + Math.sin(ctrlAngle) * ctrlDist;

      arr.push({
        tx, ty, sx, sy, ctrlX, ctrlY,
        r, g, b,
        delay, duration,
        size: PARTICLE_MIN_SIZE + Math.random() * (PARTICLE_MAX_SIZE - PARTICLE_MIN_SIZE),
        // gold-tinted while in flight, true color on arrival
        flightTint: Math.random() < 0.65
      });
    }
  }
  particles = arr;
}

// Quadratic Bézier point
function quadBezier(p0, p1, p2, t) {
  const u = 1 - t;
  return u*u*p0 + 2*u*t*p1 + t*t*p2;
}

function drawBackground(progress) {
  // Subtle background pulse - very low intensity to not distract
  ctx.fillStyle = '#0d1f3d';
  ctx.fillRect(0, 0, W, H);

  // Radial glow that brightens as crest assembles
  const glowStrength = easeInOutCubic(clamp01((progress - 0.15) / 0.55));
  const cx = W / 2, cy = CREST_Y + crestHeight / 2;
  const grad = ctx.createRadialGradient(cx, cy, 30, cx, cy, 760);
  grad.addColorStop(0, `rgba(244, 200, 60, ${0.18 * glowStrength})`);
  grad.addColorStop(0.45, `rgba(31, 67, 128, ${0.4 * glowStrength})`);
  grad.addColorStop(1, 'rgba(13, 31, 61, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawParticles(progress) {
  // Composite with screen mode for glow
  ctx.globalCompositeOperation = 'lighter';

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const local = (progress - p.delay) / p.duration;
    let t = clamp01(local);
    // ease-out so they decelerate into position
    const e = easeOutCubic(t);

    const x = quadBezier(p.sx, p.ctrlX, p.tx, e);
    const y = quadBezier(p.sy, p.ctrlY, p.ty, e);

    // Alpha ramp: fade in during first 30% of own life, fade-out trail
    const fadeIn = clamp01(local / 0.30);

    // Color: gold while moving, blend to true color near arrival
    const blend = clamp01((e - 0.65) / 0.35);
    let cr, cg, cb;
    if (p.flightTint) {
      cr = lerp(244, p.r, blend);
      cg = lerp(200, p.g, blend);
      cb = lerp(60,  p.b, blend);
    } else {
      cr = lerp(180, p.r, blend);
      cg = lerp(160, p.g, blend);
      cb = lerp(90,  p.b, blend);
    }

    const alpha = 0.95 * fadeIn;

    ctx.fillStyle = `rgba(${cr|0}, ${cg|0}, ${cb|0}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';
}

function drawCrestSettled(progress) {
  // Fade in the actual crest image starting at 55% to sharpen the silhouette
  const settle = clamp01((progress - 0.55) / 0.30);
  if (settle <= 0) return;
  ctx.save();
  ctx.globalAlpha = easeOutCubic(settle);
  // subtle glow behind crest
  ctx.shadowColor = 'rgba(244, 200, 60, 0.45)';
  ctx.shadowBlur = 40 * settle;
  ctx.drawImage(crestImage, CREST_X, CREST_Y, CREST_W, crestHeight);
  ctx.restore();
}

function drawText(progress) {
  // Text fades in 70%-92% of timeline
  const t = easeOutCubic(clamp01((progress - 0.70) / 0.22));
  if (t <= 0) return;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(244, 200, 60, ${t})`;
  ctx.font = '500 78px Georgia, "Times New Roman", serif';
  ctx.shadowColor = `rgba(244, 200, 60, ${0.4 * t})`;
  ctx.shadowBlur = 18 * t;
  // Letter-spacing approximation via ctx not standard; use slight tracking on draw
  const text = 'OLS  Digital  Skills';
  ctx.fillText(text, W / 2, TEXT_BASELINE_Y);

  // Gold rule above the text
  const ruleW = 280 * t;
  ctx.shadowBlur = 0;
  ctx.fillStyle = `rgba(244, 200, 60, ${0.85 * t})`;
  ctx.fillRect(W/2 - ruleW/2, TEXT_BASELINE_Y - 86, ruleW, 2);
  ctx.restore();

  // Subtitle (only on the final hold)
  const t2 = easeOutCubic(clamp01((progress - 0.83) / 0.14));
  if (t2 > 0) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255, 255, 255, ${0.65 * t2})`;
    ctx.font = '300 22px Georgia, "Times New Roman", serif';
    ctx.fillText('OUR LADY’S GRAMMAR SCHOOL  ·  NEWRY', W / 2, TEXT_BASELINE_Y + 48);
    ctx.restore();
  }
}

function drawSparkleAccents(progress) {
  // After the crest settles, drop a few drifting gold sparkles
  if (progress < 0.70) return;
  const phase = (progress - 0.70) / 0.30;
  const sparkles = 8;
  for (let i = 0; i < sparkles; i++) {
    const seed = i * 1313.7;
    const x = W/2 + Math.cos(seed + progress * 4) * (220 + i * 18);
    const y = CREST_Y + crestHeight/2 + Math.sin(seed * 0.7 + progress * 5) * (140 + i * 8);
    const size = 1.5 + Math.sin(progress * 30 + i) * 0.9;
    const a = (0.4 + 0.4 * Math.sin(progress * 12 + i * 0.7)) * clamp01(phase * 2);
    ctx.fillStyle = `rgba(255, 222, 130, ${a})`;
    ctx.beginPath();
    ctx.arc(x, y, Math.max(0.6, size), 0, Math.PI * 2);
    ctx.fill();
  }
}

function renderFrame(progress) {
  // progress: 0..1 across the animation
  ctx.clearRect(0, 0, W, H);
  drawBackground(progress);
  drawParticles(progress);
  drawCrestSettled(progress);
  drawText(progress);
  drawSparkleAccents(progress);
}

// ----- Entry point -----

async function init() {
  crestImage = document.getElementById('crest-src');
  if (!crestImage.complete || crestImage.naturalWidth === 0) {
    await new Promise((res, rej) => { crestImage.onload = res; crestImage.onerror = rej; });
  }
  buildParticles();

  const params = new URLSearchParams(window.location.search);
  if (params.has('frame')) {
    // Deterministic single-frame render for capture
    const frame = parseInt(params.get('frame'), 10) || 0;
    const progress = clamp01(frame / (TOTAL_FRAMES - 1));
    renderFrame(progress);
    document.body.dataset.ready = 'true';
  } else {
    // Real-time loop (for previewing in browser)
    const start = performance.now();
    const loop = (now) => {
      const elapsed = now - start;
      const progress = clamp01(elapsed / DURATION_MS);
      renderFrame(progress);
      if (elapsed < DURATION_MS + 800) requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }
}

init().catch(err => {
  document.body.innerHTML = '<pre style="color:white;padding:20px;font:14px monospace">' + (err.stack || err) + '</pre>';
});
</script>
</body>
</html>
