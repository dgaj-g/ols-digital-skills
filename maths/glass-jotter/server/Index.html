<script>
/* The Glass Jotter \u2014 method-movie engine + shared diagram renderer.
   A movie is data (see INTERFACES.md): steps of {say, do:[ops]}.
   Forward play animates ops (pen-speed stroke draws, writing reveals,
   counting values, stamps, balance tips). Jumping back/around rebuilds
   the stage instantly from the op history \u2014 the model is the script. */
(function () {
  'use strict';

  var SVGNS = 'http://www.w3.org/2000/svg';
  var PEN_SPEED = 0.45; // px per ms
  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function el(tag, cls, html) {
    var d = document.createElement(tag);
    if (cls) d.className = cls;
    if (html != null) d.innerHTML = html;
    return d;
  }
  function sv(tag, attrs) {
    var n = document.createElementNS(SVGNS, tag);
    for (var k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  }
  function drawStroke(path, instant) {
    var len = 0;
    try { len = path.getTotalLength(); } catch (e) { len = 60; }
    if (instant || REDUCED) return Promise.resolve();
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
    path.getBoundingClientRect(); // flush
    var dur = Math.min(1200, len / PEN_SPEED);
    path.style.transition = 'stroke-dashoffset ' + dur + 'ms linear';
    path.style.strokeDashoffset = '0';
    return new Promise(function (res) { setTimeout(res, dur + 30); });
  }

  /* \u2550\u2550\u2550 shared diagram renderer \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
     Returns a handle with everything jotter.js and staff.js need. */
  function renderDiagram(host, diagram, opts) {
    opts = opts || {};
    var SC = 10; // abstract unit \u2192 px
    var W = diagram.w * SC, H = diagram.h * SC;
    var svg = sv('svg', { viewBox: '0 0 ' + W + ' ' + H, role: 'img' });
    svg.style.width = '100%';
    svg.style.maxWidth = Math.min(640, W) + 'px';
    host.appendChild(svg);
    var gSegs = sv('g', {}), gArcs = sv('g', {}), gText = sv('g', {});
    svg.appendChild(gSegs); svg.appendChild(gArcs); svg.appendChild(gText);

    function P(name) { var p = diagram.pts[name]; return { x: p[0] * SC, y: p[1] * SC }; }
    function angDef(name) { return diagram.angles[name]; }
    function rayAngle(at, toward) {
      var a = P(at), b = P(toward);
      return Math.atan2(b.y - a.y, b.x - a.x);
    }

    var segEls = {}, arcEls = {}, valEls = {}, sqEls = {};

    function makeSeg(s, visible) {
      var a = P(s.from), b = P(s.to);
      var g = sv('g', {});
      var line = sv('line', { x1: a.x, y1: a.y, x2: b.x, y2: b.y, stroke: '#14213A', 'stroke-width': 2.4, 'stroke-linecap': 'round' });
      if (s.dash) line.setAttribute('stroke-dasharray', '7 6');
      g.appendChild(line);
      if (s.par) { // parallel arrowheads at the midpoint
        var mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        var th = Math.atan2(b.y - a.y, b.x - a.x);
        for (var i = 0; i < s.par; i++) {
          var off = (i - (s.par - 1) / 2) * 10;
          var cx = mx + Math.cos(th) * off, cy = my + Math.sin(th) * off;
          var w = 9;
          var p1 = (cx - Math.cos(th - 0.5) * w) + ',' + (cy - Math.sin(th - 0.5) * w);
          var p2 = cx + ',' + cy;
          var p3 = (cx - Math.cos(th + 0.5) * w) + ',' + (cy - Math.sin(th + 0.5) * w);
          g.appendChild(sv('polyline', { points: p1 + ' ' + p2 + ' ' + p3, fill: 'none', stroke: '#14213A', 'stroke-width': 2 }));
        }
      }
      // endpoint letters
      [s.from, s.to].forEach(function (nm) {
        if (diagram.labelled === false) return;
        if (nm.charAt(0) === '_') return; // underscore points are cosmetic, unlabelled
        if (gText.querySelector('[data-pt="' + nm + '"]')) return;
        var pt = P(nm);
        var others = Object.keys(diagram.pts).map(function (k) { return P(k); });
        var cx = others.reduce(function (s2, o) { return s2 + o.x; }, 0) / others.length;
        var cy = others.reduce(function (s2, o) { return s2 + o.y; }, 0) / others.length;
        var dx = pt.x - cx, dy = pt.y - cy, dl = Math.hypot(dx, dy) || 1;
        var t = sv('text', {
          x: pt.x + (dx / dl) * 16, y: pt.y + (dy / dl) * 16 + 5,
          'text-anchor': 'middle', 'data-pt': nm, 'data-basesize': 14
        });
        t.textContent = nm.replace(/\d+$/, '');
        t.style.cssText = 'font-family:var(--f-maths);font-size:17px;font-style:italic;fill:#14213A';
        gText.appendChild(t);
      });
      g.style.opacity = visible ? 1 : 0;
      gSegs.appendChild(g);
      segEls[s.id || (s.from + s.to)] = g;
      return g;
    }

    function arcPath(name, rOff) {
      var d = angDef(name);
      var v = P(d.at);
      var a1 = rayAngle(d.at, d.from), a2 = rayAngle(d.at, d.to);
      var sweep = a2 - a1;
      while (sweep < 0) sweep += Math.PI * 2;
      if (!d.reflex && sweep > Math.PI) { var tmp = a1; a1 = a2; a2 = tmp; sweep = Math.PI * 2 - sweep; }
      if (d.reflex && sweep < Math.PI) { var t2 = a1; a1 = a2; a2 = t2; sweep = Math.PI * 2 - sweep; }
      var r = 22 + (rOff || 0) * 9;
      var x1 = v.x + Math.cos(a1) * r, y1 = v.y + Math.sin(a1) * r;
      var x2 = v.x + Math.cos(a2) * r, y2 = v.y + Math.sin(a2) * r;
      var large = sweep > Math.PI ? 1 : 0;
      return {
        d: 'M ' + x1.toFixed(1) + ' ' + y1.toFixed(1) + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2.toFixed(1) + ' ' + y2.toFixed(1),
        mid: { x: v.x + Math.cos(a1 + sweep / 2) * (r + 15), y: v.y + Math.sin(a1 + sweep / 2) * (r + 15) },
        vertex: v, a1: a1, sweep: sweep, r: r
      };
    }

    var arcCount = {};
    function makeArc(name, visible, colour) {
      var d = angDef(name);
      var v = P(d.at);
      arcCount[d.at] = (arcCount[d.at] || 0);
      var info = arcPath(name, arcCount[d.at]++);
      var g = sv('g', { 'data-ang': name });
      if (d.value === 90 && d.given && !d.reflex) { // right-angle square: GIVEN angles only \u2014 drawing it on an unknown would leak the answer
        var a1 = rayAngle(d.at, d.from), s = 13;
        var x1 = v.x + Math.cos(a1) * s, y1 = v.y + Math.sin(a1) * s;
        var a2 = rayAngle(d.at, d.to);
        var x2 = v.x + Math.cos(a2) * s, y2 = v.y + Math.sin(a2) * s;
        var x3 = x1 + Math.cos(a2) * s, y3 = y1 + Math.sin(a2) * s;
        var p = sv('path', { d: 'M ' + x1 + ' ' + y1 + ' L ' + x3 + ' ' + y3 + ' L ' + x2 + ' ' + y2, fill: 'none', stroke: colour || '#1A3A6B', 'stroke-width': 2 });
        g.appendChild(p);
        sqEls[name] = p;
      } else {
        // wide transparent hit band so the thin arc is easy to TAP on a phone
        g.appendChild(sv('path', { d: info.d, fill: 'none', stroke: 'transparent', 'stroke-width': 42, 'stroke-linecap': 'round', 'pointer-events': 'stroke' }));
        var p2 = sv('path', { d: info.d, fill: 'none', stroke: colour || '#1A3A6B', 'stroke-width': 2.2, 'stroke-linecap': 'round' });
        g.appendChild(p2);
      }
      // value or letter label
      var lbl = sv('text', { x: info.mid.x, y: info.mid.y + 5, 'text-anchor': 'middle', 'data-anglabel': name, 'data-basesize': 13 });
      lbl.style.cssText = 'font-family:var(--f-maths);font-size:16px;fill:#14213A';
      if (d.given) lbl.textContent = d.value + '\u00b0';
      else if (d.label) { lbl.textContent = d.label; lbl.style.fontStyle = 'italic'; }
      else lbl.textContent = '';
      g.appendChild(lbl);
      g.classList.add('ang-arc');
      g.style.opacity = visible ? 1 : 0;
      gArcs.appendChild(g);
      arcEls[name] = g; valEls[name] = lbl;
      return g;
    }

    (diagram.segs || []).forEach(function (s) { makeSeg(s, !opts.deferred); });
    Object.keys(diagram.angles || {}).forEach(function (nm) { makeArc(nm, !opts.deferred); });

    /* Responsive: fit the viewBox to the actual figure (kills the empty
       canvas so the diagram fills the width, vital on phones) and keep every
       label at a constant on-screen size whatever the device scale. */
    function applyLabelScale(vbW) {
      var dispW = svg.getBoundingClientRect().width;
      var scale = dispW / vbW;
      if (!scale || !isFinite(scale)) return;
      Array.prototype.forEach.call(svg.querySelectorAll('[data-basesize]'), function (el) {
        el.style.fontSize = (parseFloat(el.getAttribute('data-basesize')) / scale).toFixed(1) + 'px';
      });
    }
    var fitW = W;
    try {
      var bb = svg.getBBox();
      if (bb && bb.width > 4 && bb.height > 4) {
        var m = 26;
        fitW = bb.width + 2 * m;
        svg.setAttribute('viewBox', (bb.x - m).toFixed(1) + ' ' + (bb.y - m).toFixed(1) + ' ' + fitW.toFixed(1) + ' ' + (bb.height + 2 * m).toFixed(1));
        svg.style.maxWidth = Math.min(560, Math.max(240, fitW)) + 'px';
      }
    } catch (e) {}
    applyLabelScale(fitW);
    if (window.ResizeObserver) {
      var ro = new ResizeObserver(function () { applyLabelScale(parseFloat(svg.getAttribute('viewBox').split(' ')[2]) || fitW); });
      ro.observe(svg);
    }

    var handle = {
      svg: svg,
      segEl: function (id) { return segEls[id]; },
      arcEl: function (nm) { return arcEls[nm]; },
      reveal: function (kind, key, instant) {
        var g = kind === 'seg' ? segEls[key] : arcEls[key];
        if (!g) return Promise.resolve();
        g.style.opacity = 1;
        var strokes = g.querySelectorAll('path, line, polyline');
        var pr = Promise.resolve();
        strokes.forEach(function (s2) { pr = pr.then(function () { return drawStroke(s2, instant); }); });
        return pr;
      },
      showValue: function (nm, value, opts2) {
        opts2 = opts2 || {};
        var lbl = valEls[nm];
        if (!lbl) return Promise.resolve();
        var d = angDef(nm);
        var target = (value != null) ? value : d.value;
        lbl.style.fill = opts2.colour || '#1A3A6B';
        if (opts2.italic) lbl.style.fontStyle = 'italic';
        if (REDUCED || opts2.instant) { lbl.textContent = target + '\u00b0'; return Promise.resolve(); }
        var t0 = null, dur = opts2.dur || 600;
        return new Promise(function (res) {
          function tick(ts) {
            if (!t0) t0 = ts;
            var f = Math.min(1, (ts - t0) / dur);
            lbl.textContent = Math.round(target * f) + '\u00b0';
            if (f < 1) requestAnimationFrame(tick); else res();
          }
          requestAnimationFrame(tick);
        });
      },
      setText: function (nm, text) { if (valEls[nm]) valEls[nm].textContent = text; },
      pulse: function (nm, on) { if (arcEls[nm]) arcEls[nm].classList.toggle('pulse', on !== false); },
      overlay: function (ptNames, colour, instant) { // Z / F / U shape tracing
        var pts = ptNames.map(function (n) { var p = P(n); return p.x + ',' + p.y; }).join(' ');
        var pl = sv('polyline', { points: pts, fill: 'none', stroke: colour || '#E4B824', 'stroke-width': 6, 'stroke-linecap': 'round', 'stroke-linejoin': 'round', opacity: 0.55 });
        svg.appendChild(pl);
        return drawStroke(pl, instant).then(function () { return pl; });
      },
      clearOverlays: function () {
        svg.querySelectorAll('polyline[opacity="0.55"]').forEach(function (n) { n.remove(); });
      }
    };
    return handle;
  }

  /* \u2550\u2550\u2550 the movie player \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  function mount(host, movie, opts) {
    opts = opts || {};
    host.innerHTML = '';
    var root = el('div', 'movie');
    root.innerHTML =
      '<div class="movie-head"><span class="movie-head-badge">Worked example</span>' +
      '<span class="movie-head-title"></span></div>' +
      '<div class="movie-stage"></div>' +
      '<div class="movie-caption"><span class="cap-num">1</span><span class="cap-text"></span></div>' +
      '<div class="movie-controls">' +
      '<button class="btn-pencil mc-back" aria-label="Previous step">\u25c0</button>' +
      '<button class="btn-stamp mc-play" aria-label="Play">\u25b6 Play</button>' +
      '<button class="btn-pencil mc-fwd" aria-label="Next step">\u25b6</button>' +
      '<div class="movie-dots"></div></div>';
    host.appendChild(root);
    root.querySelector('.movie-head-title').textContent = movie.title || '';

    var stage = root.querySelector('.movie-stage');
    var capText = root.querySelector('.cap-text');
    var capNum = root.querySelector('.cap-num');
    var dots = root.querySelector('.movie-dots');
    movie.steps.forEach(function (_, i) {
      var d = el('span', 'movie-dot');
      d.addEventListener('click', function () { stopAuto(); goto(i, true); });
      dots.appendChild(d);
    });

    var stepIdx = -1, playing = false, autoTimer = null, busy = false;
    var dgm = null, paperLines = [], balanceEl = null;

    function resetStage() {
      stage.innerHTML = '';
      paperLines = []; balanceEl = null; dgm = null;
      if (movie.mode === 'diagram' && movie.diagram) {
        var dwrap = el('div', 'jq-diagram');
        stage.appendChild(dwrap);
        dgm = renderDiagram(dwrap, movie.diagram, { deferred: !!movie.deferred });
      }
    }

    function paperWrite(op, instant) {
      var line = el('div', 'movie-line');
      var eq = el('span', 'ml-eq', op.write.text);
      line.appendChild(eq);
      if (op.write.margin) line.appendChild(el('span', 'ml-margin', op.write.margin));
      stage.appendChild(line);
      paperLines.push(line);
      if (instant || REDUCED) return Promise.resolve();
      eq.style.clipPath = 'inset(0 100% 0 0)';
      eq.getBoundingClientRect();
      var dur = Math.min(560, 220 + op.write.text.length * 14);
      eq.style.transition = 'clip-path ' + dur + 'ms linear';
      eq.style.clipPath = 'inset(0 0 0 0)';
      return new Promise(function (r) { setTimeout(r, dur + 40); });
    }

    function paperTick(op, instant) {
      var line = paperLines[op.tick.line];
      if (!line) return Promise.resolve();
      var s = sv('svg', { viewBox: '0 0 30 24', class: 'mark-tick' });
      s.style.cssText = 'width:26px;height:21px;margin-left:10px;vertical-align:-3px;overflow:visible';
      var p = sv('path', { d: 'M4 13 L11 20 L26 4' });
      s.appendChild(p);
      line.appendChild(s);
      return drawStroke(p, instant);
    }

    function paperBox(op, instant) {
      var line = paperLines[op.box.line];
      if (!line) return Promise.resolve();
      var eq = line.querySelector('.ml-eq');
      var w = eq.offsetWidth + 22, h = eq.offsetHeight + 8;
      var hold = el('span', 'answer-boxed');
      eq.parentNode.insertBefore(hold, eq);
      hold.appendChild(eq);
      var s = sv('svg', { class: 'box-draw', viewBox: '0 0 ' + w + ' ' + h });
      var p = sv('path', { d: 'M2 2 H ' + (w - 2) + ' V ' + (h - 2) + ' H 2 Z' });
      s.appendChild(p);
      hold.appendChild(s);
      return drawStroke(p, instant);
    }

    function paperGrid(op, instant) {
      var g = op.grid;
      var t = el('table', 'movie-grid');
      var r1 = '<tr><th>\u00d7</th>' + g.b.map(function (x) { return '<th>' + x + '</th>'; }).join('') + '</tr>';
      var r2 = '<tr><th>' + g.a + '</th>' + g.vals.map(function (v) { return '<td>' + v + '</td>'; }).join('') + '</tr>';
      t.innerHTML = r1 + r2;
      stage.appendChild(t);
      if (instant || REDUCED) { t.querySelectorAll('td').forEach(function (td) { td.style.opacity = 1; }); return Promise.resolve(); }
      var cells = t.querySelectorAll('td');
      cells.forEach(function (td) { td.style.opacity = 0; td.style.transition = 'opacity 300ms'; });
      var pr = Promise.resolve();
      cells.forEach(function (td) {
        pr = pr.then(function () { td.style.opacity = 1; return new Promise(function (r) { setTimeout(r, 340); }); });
      });
      return pr;
    }

    function paperBalance(op, instant) {
      if (!balanceEl) {
        balanceEl = el('div', 'movie-balance');
        balanceEl.innerHTML = '<svg viewBox="0 0 300 96">' +
          '<line x1="150" y1="26" x2="150" y2="82" stroke="#5B6470" stroke-width="3"/>' +
          '<path d="M120 82 h60" stroke="#5B6470" stroke-width="3"/>' +
          '<g class="beam" style="transform-origin:150px 26px;transition:transform 700ms var(--ease-needle)">' +
          '<line x1="40" y1="26" x2="260" y2="26" stroke="#7A3B5E" stroke-width="3"/>' +
          '<path d="M40 26 l-13 22 h26 Z" fill="none" stroke="#7A3B5E" stroke-width="2"/>' +
          '<path d="M260 26 l-13 22 h26 Z" fill="none" stroke="#7A3B5E" stroke-width="2"/>' +
          '<text class="bl" x="40" y="64" text-anchor="middle" style="font-family:var(--f-maths);font-size:15px"></text>' +
          '<text class="br" x="260" y="64" text-anchor="middle" style="font-family:var(--f-maths);font-size:15px"></text>' +
          '</g><circle cx="150" cy="26" r="3.4" fill="#7A3B5E"/></svg>';
        stage.insertBefore(balanceEl, stage.firstChild);
      }
      var b = op.balance;
      if (b.l != null) balanceEl.querySelector('.bl').textContent = b.l;
      if (b.r != null) balanceEl.querySelector('.br').textContent = b.r;
      var beam = balanceEl.querySelector('.beam');
      var tips = Array.isArray(b.tip) ? b.tip : [b.tip || 0];
      if (instant || REDUCED) { beam.style.transform = 'rotate(' + tips[tips.length - 1] + 'deg)'; return Promise.resolve(); }
      var pr = Promise.resolve();
      tips.forEach(function (t) {
        pr = pr.then(function () {
          beam.style.transform = 'rotate(' + t + 'deg)';
          return new Promise(function (r) { setTimeout(r, 720); });
        });
      });
      return pr;
    }

    function doStamp(op, instant) {
      var text = op.stamp.text;
      if (!text && op.stamp.reason && window.GJ_CONTENT) {
        var packs = window.GJ_CONTENT;
        Object.keys(packs).some(function (k) {
          var bank = packs[k].reasonBank || [];
          var hit = bank.filter(function (r) { return r.id === op.stamp.reason; })[0];
          if (hit) { text = hit.text; return true; }
          return false;
        });
      }
      var st = el('div', 'theorem-stamp' + (instant || REDUCED ? '' : ' stamp-in'), text || '');
      var holder = el('div', '');
      holder.style.cssText = 'text-align:center;margin:8px 0';
      holder.appendChild(st);
      stage.appendChild(holder);
      return new Promise(function (r) { setTimeout(r, instant ? 0 : 240); });
    }

    function doNote(op, instant) {
      var n = el('div', op.note.red ? 'mk-comment' : 'ui-msg', op.note.text);
      stage.appendChild(n);
      if (instant || REDUCED) return Promise.resolve();
      n.style.opacity = 0; n.getBoundingClientRect();
      n.style.transition = 'opacity 320ms'; n.style.opacity = 1;

      if (op.tick) return paperTick(op, instant);
      if (op.box) return paperBox(op, instant);
      if (op.grid) return paperGrid(op, instant);
      if (op.balance) return paperBalance(op, instant);
      if (op.stamp) return doStamp(op, instant);
      if (op.note) return doNote(op, instant);
      if (op.clear) { resetStage(); return Promise.resolve(); }

            setTimeout(function () { last.querySelector('.ml-eq').classList.remove('glow-sweep'); }, 900);
          }

      if (op.arc) return dgm.reveal('arc', op.arc.ang, instant);
      if (op.value) return dgm.showValue(op.value.ang, op.value.to, { instant: instant, colour: op.value.colour });

    }

    function showCaption(i) {
      capNum.textContent = i + 1;
      capText.textContent = movie.steps[i].say || '';

      if (busy) return Promise.resolve();

        (function (kk) {
          pr = pr.then(function () {
            var pr2 = Promise.resolve();
            movie.steps[kk].do.forEach(function (op) { pr2 = pr2.then(function () { return applyOp(op, true); }); });
            return pr2;

    }

    function advance() {
      if (stepIdx + 1 >= movie.steps.length) { setPlaying(false); return; }
      if (busy) return;
      busy = true;
      stepIdx++;
      showCaption(stepIdx);
      renderDots();
      var pr = Promise.resolve();
      movie.steps[stepIdx].do.forEach(function (op) { pr = pr.then(function () { return applyOp(op, false); }); });
      pr.then(function () { busy = false; scheduleAuto(); }, function () { busy = false; });
    }

    function readTime(i) {
      // dwell AFTER the step's animation has finished. The caption has been
      // on screen throughout the draw, so this is top-up reading time, not
      // the whole read \u2014 keep it snappy. ~270 wpm, floored and capped.
      var words = (movie.steps[i].say || '').split(/\s+/).length;
      return Math.min(3600, Math.max(850, words * 200));
    }
    function scheduleAuto() {
      if (!playing) return;
      clearTimeout(autoTimer);
      if (stepIdx + 1 >= movie.steps.length) { setPlaying(false); return; }
      autoTimer = setTimeout(advance, readTime(stepIdx));
    }
    function stopAuto() { setPlaying(false); }
    function setPlaying(on) {
      playing = on;
      clearTimeout(autoTimer);
      root.querySelector('.mc-play').innerHTML = on ? '\u275a\u275a Pause' : (stepIdx + 1 >= movie.steps.length ? '\u21ba Replay' : '\u25b6 Play');
      if (on) scheduleAuto();
    }

    root.querySelector('.mc-play').addEventListener('click', function () {
      if (playing) { setPlaying(false); return; }
      if (stepIdx + 1 >= movie.steps.length) { goto(0); setPlaying(true); return; }
      setPlaying(true);
      if (stepIdx === -1) advance(); else scheduleAuto();
    });
    root.querySelector('.mc-fwd').addEventListener('click', function () { stopAuto(); advance(); });
    root.querySelector('.mc-back').addEventListener('click', function () { stopAuto(); goto(Math.max(0, stepIdx - 1), true); });

    goto(0, true);

    return {
      play: function () { setPlaying(true); },
      pause: function () { setPlaying(false); },
      step: function (d) { stopAuto(); d > 0 ? advance() : goto(stepIdx - 1, true); },
      goto: goto,
      destroy: function () { clearTimeout(autoTimer); host.innerHTML = ''; }
    };
  }

  window.GJ_PLAYER = { mount: mount, renderDiagram: renderDiagram };
})();

</script>
<script>

      crossings.forEach(function (dd) {
        var rad = dd * Math.PI / 180, cx = Math.cos(rad), cy = -Math.sin(rad);
        focus.appendChild(sv('line', { x1: (cx * (PROT_R - 15)).toFixed(1), y1: (cy * (PROT_R - 15)).toFixed(1), x2: (cx * (PROT_R + 3)).toFixed(1), y2: (cy * (PROT_R + 3)).toFixed(1), stroke: '#E4B824', 'stroke-width': 3, 'stroke-linecap': 'round' }));
        focus.appendChild(sv('circle', { cx: (cx * PROT_R).toFixed(1), cy: (cy * PROT_R).toFixed(1), r: 3.2, fill: '#E4B824' }));
        var lab = Math.max(0, Math.min(180, Math.round(dd / 10) * 10));
        Array.prototype.forEach.call(prot.querySelectorAll('[data-pos="' + lab + '"]'), function (n) { n.classList.add('lit'); });
      });
    }

    var state = { cx: 152, cy: 128, rot: 0 };  // starts above the angle, both knobs on-canvas
    function apply() { prot.setAttribute('transform', 'translate(' + state.cx.toFixed(1) + ',' + state.cy.toFixed(1) + ') rotate(' + state.rot.toFixed(1) + ')'); updateReadout(); }
    apply();

    function toSvg(e) { var pp = svg.createSVGPoint(); pp.x = e.clientX; pp.y = e.clientY; return pp.matrixTransform(svg.getScreenCTM().inverse()); }
    var drag = null;
    function onMove(e) {
      if (!drag) return;
      var pp = toSvg(e);
      if (drag.mode === 'move') { state.cx = drag.cx + (pp.x - drag.p.x); state.cy = drag.cy + (pp.y - drag.p.y); }
      else { var ang = Math.atan2(pp.y - state.cy, pp.x - state.cx); state.rot = drag.rot + (ang - drag.ang) * 180 / Math.PI; }
      apply();
    }
    function onUp() {
      drag = null;
      document.body.classList.remove('dragging-active');
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
    }
    function onDown(e, mode) {
      if (rec.lock) return;
      e.preventDefault();
      var pp = toSvg(e);
      document.body.classList.add('dragging-active');
      drag = { mode: mode, p: pp, cx: state.cx, cy: state.cy, rot: state.rot, ang: Math.atan2(pp.y - state.cy, pp.x - state.cx) };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onUp);
    }
    prot.addEventListener('pointerdown', function (e) {
      if (e.target.closest && e.target.closest('.rotate-handle')) return;
      onDown(e, 'move');
    });
    Array.prototype.forEach.call(prot.querySelectorAll('.rotate-handle'), function (h) {
      h.addEventListener('pointerdown', function (e) { e.stopPropagation(); onDown(e, 'rotate'); });
    });

    body.appendChild(el('p', 'ui-msg', 'Line the small red centre mark on the corner, then use a rotate knob (at either end) to turn the protractor so 0 sits along one arm, and read where the other arm crosses.'));
    var compHost = el('div', '');
    body.appendChild(compHost);
    var composer = makeComposer(compHost, { numericOnly: true, label: 'Your measurement in degrees', placeholder: 'type the size you measure, in degrees', onCommit: function () { runCheck(); } });

    var msgEl = el('p', 'ui-msg');
    body.appendChild(msgEl);
    var checkRow = el('div', 'check-row');
    var checkBtn = el('button', 'btn-stamp', 'Check my measurement');
    checkBtn.type = 'button';
    checkRow.appendChild(checkBtn);
    body.appendChild(checkRow);
    var feedback = el('div', 'jq-feedback');
    body.appendChild(feedback);

    function flash(t) { msgEl.textContent = t; }

    function finish(last, instant) {
      var res = protractorMark(q, last.read);
      feedback.innerHTML = '';
      var mk = el('span', 'wl-mark');
      mk.style.cssText = 'position:static;display:inline-block;width:26px;height:22px;vertical-align:middle';
      feedback.appendChild(mk);
      drawMark(mk, res.ok ? 'tick' : 'cross');
      feedback.appendChild(el('span', 'mk-tally', ' ' + (res.ok ? '1/1' : '0/1') + ' \u00b7 you measured ' + last.read + '\u00b0'));
      if (rec.lock) {
        if (res.ok) feedback.appendChild(el('p', 'mk-comment', commentFor(q.id, 'perfect')));
        else if (res.dx === 'WRONG_SCALE') feedback.appendChild(el('p', 'amber-note', 'You read the other scale \u2014 use the one that starts at 0 on the arm you lined up. The true size is ' + q.value + '\u00b0.'));
        else feedback.appendChild(el('p', 'ui-msg', 'Not quite \u2014 line the centre on the corner and 0 along an arm, then read again. The true size is ' + q.value + '\u00b0.'));
        checkRow.hidden = true;
        composer.root.setAttribute('aria-disabled', 'true');
        margin.innerHTML = 'Q' + hooks.number + '<div class="mk-tally" style="font-size:18px">' + (res.ok ? '1' : '0') + '/1</div>';
      } else if (!instant) {
        if (res.dx === 'WRONG_SCALE') feedback.appendChild(el('p', 'amber-note', 'Close \u2014 but check you are reading the scale that starts at 0 on your lined-up arm. One more go.'));
        else feedback.appendChild(el('p', 'ui-msg', 'Line it up carefully and read again \u2014 one more attempt.'));
        composer.clear();
      }
    }

    function runCheck() {
      if (rec.lock) return;
      var raw = composer.value();
      var read = parseInt(raw, 10);
      if (raw === '' || isNaN(read)) { flash('Type the size you measured first.'); return; }
      if (read < 0 || read > 360) { flash('A measurement should be between 0 and 360 degrees.'); return; }
      var res = protractorMark(q, read);
      var att = { read: read, dur: Math.round((Date.now() - t0) / 1000), res: res.ok ? 'OK' : 'X@1' };
      if (res.dx) att.dx = res.dx;
      rec.att.push(att);
      if (res.ok || rec.att.length >= 2) rec.lock = true;
      finish(att);
      hooks.onSave(q.id, rec);
    }
    checkBtn.addEventListener('click', runCheck);

    if (rec.lock && rec.att.length) finish(rec.att[rec.att.length - 1], true);
    return { qid: q.id };
  }

  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 mount \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  function mount(host, q, savedRec, hooks) {
    if (q.kind === 'classify') return mountClassify(host, q, savedRec, hooks);
    if (q.kind === 'protractor') return mountProtractor(host, q, savedRec, hooks);
    var actId = hooks.actId;
    var isAngles = actId === 'angles';
    var rec = savedRec || { att: [], lock: false, ovr: null };
    if (!rec.att) rec.att = [];
    var t0 = Math.floor(Date.now() / 1000);

    var wrap = el('div', 'jotter-q');
    wrap.id = 'jq-' + q.id;
    var margin = el('div', 'jq-margin', 'Q' + hooks.number);
    var body = el('div', 'jq-body');
    wrap.appendChild(margin); wrap.appendChild(body);
    host.appendChild(wrap);

    var marksTotal = q.marks[0] + q.marks[1];
    body.appendChild(el('p', 'jq-prompt',
      esc(q.prompt) + ' <span class="q-marks">[' + marksTotal + (marksTotal === 1 ? ' mark' : ' marks') + ']</span>'));

    /* current (open) attempt working state */
    var cur = { L: [], steps: [], t0: Date.now() };
    var linesEl = el('div', 'wlines');
    body.appendChild(linesEl);

    var dgm = null, established = {};
    if (isAngles && q.diagram) {
      var dwrap = el('div', 'jq-diagram');
      body.insertBefore(dwrap, linesEl);
      dgm = window.GJ_PLAYER.renderDiagram(dwrap, q.diagram, {});
    }

    var ui = el('div', 'jq-ui');
    body.appendChild(ui);
    var checkRow = el('div', 'check-row');
    var checkBtn = el('button', 'btn-stamp', 'Check my working');
    checkBtn.type = 'button';
    var attemptNote = el('span', 'attempt-note', '');
    checkRow.appendChild(checkBtn); checkRow.appendChild(attemptNote);
    body.appendChild(checkRow);
    var feedback = el('div', 'jq-feedback');
    body.appendChild(feedback);

    /* \u2500\u2500 render committed prior attempts (struck-through) + state \u2500\u2500 */
    function renderLine(line, opts2) {
      opts2 = opts2 || {};
      var row = el('div', 'wline' + (opts2.cls ? ' ' + opts2.cls : ''));
      var markHolder = el('span', 'wl-mark');
      row.appendChild(markHolder);
      row.appendChild(el('span', 'wl-eq', esc(pretty(line.t))));
      var note = marginNote(line.op);
      if (note) row.appendChild(el('span', 'wl-margin-note', esc(note)));
      (opts2.into || linesEl).appendChild(row);
      return { row: row, mark: markHolder };
    }
    function marginNote(op) {
      if (!op) return '';
      if (op === 'exp') return '(expand)';
      if (op === 'col') return '(collect)';
      if (op === 'rw') return '';
      if (op === 'start') return '';
      return '(' + pretty(op) + ')';
    }
    function renderStepLine(st, opts2) {
      opts2 = opts2 || {};
      var bank = (window.GJ_CONTENT.angles.reasonBank || []);
      var rsn = bank.filter(function (r) { return r.id === st.rsn; })[0];
      var calcBit = st.calc ? ' <span class="wl-margin-note">(' + esc(pretty(st.calc)) + ')</span>' : '';
      var row = el('div', 'wline' + (opts2.cls ? ' ' + opts2.cls : ''));
      row.appendChild(el('span', 'wl-mark'));
      row.innerHTML += '<span class="wl-eq">\u2220' + esc(st.ang) + ' = ' + esc(String(st.val)) + '\u00b0</span>' +
        calcBit + '<span class="wl-margin-note">(' + (rsn ? esc(rsn.text) : '?') + ')</span>';
      (opts2.into || linesEl).appendChild(row);
      return { row: row, mark: row.querySelector('.wl-mark') };
    }

    /* \u2500\u2500 ALGEBRA composer (chips + keypad) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    var pendingOp = null, composer = null;

    function buildAlgebraUI() {
      ui.innerHTML = '';
      var ask = el('p', 'ui-msg', 'What are you doing to both sides?');
      ui.appendChild(ask);
      var strip = el('div', 'chip-strip');
      var CHIPS = [
        { id: '+', label: '+ add' }, { id: '-', label: '\u2212 subtract' },
        { id: '*', label: '\u00d7 multiply' }, { id: '/', label: '\u00f7 divide' },
        { id: 'exp', label: 'Expand brackets' }, { id: 'col', label: 'Collect terms' },
        { id: 'rw', label: 'Just rewrite' }
      ];
      var operandHost = el('div', '');
      CHIPS.forEach(function (c) {
        var b = el('button', 'chip');
        b.type = 'button';
        b.textContent = c.label;
        b.setAttribute('aria-pressed', 'false');
        b.addEventListener('click', function () {
          strip.querySelectorAll('.chip').forEach(function (x) { x.setAttribute('aria-pressed', 'false'); });
          b.setAttribute('aria-pressed', 'true');
          operandHost.innerHTML = '';
          if (c.id === '+' || c.id === '-' || c.id === '*' || c.id === '/') {
            pendingOp = { kind: c.id, operand: '' };
            var opc = makeComposer(operandHost, {
              label: 'How much?', placeholder: 'how much? e.g. 15 or 3x',
              onCommit: function () {}
            });
            opc.root.classList.add('compose-mini');
            pendingOp.reader = opc;
          } else {
            pendingOp = { kind: c.id };
          }
        });
        strip.appendChild(b);
      });
      ui.appendChild(strip);
      ui.appendChild(operandHost);
      ui.appendChild(el('p', 'ui-msg', 'Then write the new line:'));
      var compHost = el('div', '');
      ui.appendChild(compHost);
      composer = makeComposer(compHost, {
        placeholder: 'write the new line of working',
        onCommit: commitAlgebraLine
      });
      var undo = el('button', 'btn-pencil', '\u21b6 remove last line');
      undo.type = 'button';
      undo.style.marginTop = '8px';
      undo.addEventListener('click', function () {
        cur.L.pop();
        redrawCurrent();
        save();
      });
      ui.appendChild(undo);
    }

    function commitAlgebraLine(text) {
      if (!text) return;
      if (text.length > 60) { flashMsg('That line is too long for the page \u2014 split it into two steps.'); return; }
      var parsed = window.GJ_MATH.parse(text);
      if (!parsed.ok) { flashMsg('I can\u2019t read that line \u2014 check it and try again. (' + (parsed.err || 'unreadable') + ')'); return; }
      if (cur.L.length >= 12) { flashMsg('That\u2019s a full page \u2014 press Check.'); return; }
      var op = 'rw';
      if (pendingOp) {
        if (pendingOp.kind === 'exp') op = 'exp';
        else if (pendingOp.kind === 'col') op = 'col';
        else if (pendingOp.kind === 'rw') op = 'rw';
        else {
          var operand = pendingOp.reader ? pendingOp.reader.value() : '';
          op = ({'+':'+','-':'\u2212','*':'\u00d7','/':'\u00f7'})[pendingOp.kind] + (operand || '?');
        }
      }
      cur.L.push({ op: op, t: text, s: Math.round((Date.now() - cur.t0) / 1000) });
      pendingOp = null;
      composer.clear();
      ui.querySelectorAll('.chip').forEach(function (x) { x.setAttribute('aria-pressed', 'false'); });
      redrawCurrent();
      save();
    }

    /* \u2500\u2500 ANGLES composer (tap angle \u2192 value \u2192 reason) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    var stepTarget = null, stepComposer = null, chosenReason = null;

    function unknownAngles() {
      var out = [];
      Object.keys(q.diagram.angles).forEach(function (nm) {
        var d = q.diagram.angles[nm];
        if (!d.given && !established[nm]) out.push(nm);
      });
      return out;
    }

    function buildAnglesUI() {
      ui.innerHTML = '';
      ui.appendChild(el('p', 'ui-msg', 'Tap an angle on the diagram, give its size, and choose the reason. Find your way to ' + (q.diagram.angles[q.target] && q.diagram.angles[q.target].label ? q.diagram.angles[q.target].label : '\u2220' + q.target) + '.'));
      var stepHost = el('div', 'step-card');
      stepHost.hidden = true;
      ui.appendChild(stepHost);

      // arcs are tappable
      Object.keys(q.diagram.angles).forEach(function (nm) {
        var g = dgm.arcEl(nm);
        if (!g) return;
        g.addEventListener('click', function () {
          var d = q.diagram.angles[nm];
          if (d.given || established[nm]) return;
          openStep(nm, stepHost);
        });
      });
      var undo = el('button', 'btn-pencil', '\u21b6 remove last step');
      undo.type = 'button';
      undo.addEventListener('click', function () {
        var last = cur.steps.pop();
        if (last) { delete established[last.ang]; dgm.setText(last.ang, q.diagram.angles[last.ang].label || ''); }
        redrawCurrent();
        save();
      });
      ui.appendChild(undo);
    }

    function openStep(nm, stepHost) {
      stepTarget = nm;
      chosenReason = null;
      stepHost.hidden = false;
      stepHost.innerHTML = '';
      dgm.pulse(nm, true);
      var row = el('div', 'sc-row');
      row.innerHTML = '<span class="sc-eq">\u2220' + esc(nm) + ' =</span>';
      var compHost = el('span', '');
      row.appendChild(compHost);
      row.innerHTML += '<span class="sc-eq">\u00b0</span>';
      stepHost.appendChild(row);
      stepComposer = makeComposer(stepHost, {
        numericOnly: true,
        label: 'Size of angle ' + nm,
        placeholder: 'the size \u2014 or type the calculation, e.g. 180\u221238',
        onCommit: function () { /* committed via the step button below */ }
      });

      // reason picker \u2014 grouped, randomised within groups, FULL bank always
      var reasons = el('div', 'reasons');
      var bank = window.GJ_CONTENT.angles.reasonBank;
      var groups = [];
      bank.forEach(function (r) { if (groups.indexOf(r.group) === -1) groups.push(r.group); });
      groups.forEach(function (gname) {
        reasons.appendChild(el('p', 'reason-group-h', esc(gname)));
        var cards = el('div', 'reason-cards');
        shuffle(bank.filter(function (r) { return r.group === gname; }), q.id + nm).forEach(function (r) {
          var b = el('button', 'reason-card');
          b.type = 'button';
          b.textContent = r.text;
          b.setAttribute('aria-pressed', 'false');
          b.addEventListener('click', function () {
            cards.parentNode.querySelectorAll('.reason-card').forEach(function (x) { x.setAttribute('aria-pressed', 'false'); });
            b.setAttribute('aria-pressed', 'true');
            chosenReason = r.id;
          });
          cards.appendChild(b);
        });
        reasons.appendChild(cards);
      });
      stepHost.appendChild(reasons);

      var doRow = el('div', 'check-row');
      var add = el('button', 'btn-stamp', 'Write the step in my jotter');
      add.type = 'button';
      add.addEventListener('click', function () {
        var raw = stepComposer.value();
        if (!raw) { flashMsg('Give the size of the angle first.'); return; }
        var calcStr = raw.replace(/\u2212/g, '-').replace(/\u00d7/g, '*').replace(/\u00f7/g, '/');
        var evald = window.GJ_MATH.evalCalc(calcStr);
        if (!evald.ok) { flashMsg('I can\u2019t read that number or calculation \u2014 check it.'); return; }
        if (!chosenReason) { flashMsg('Choose the reason \u2014 the mark scheme wants it.'); return; }
        var val = evald.val.d === 1 ? evald.val.n : evald.val.n / evald.val.d;
        var step = { ang: nm, val: val, rsn: chosenReason, s: Math.round((Date.now() - cur.t0) / 1000) };
        if (/[-+*/()]/.test(calcStr)) step.calc = raw;
        cur.steps.push(step);
        established[nm] = true;
        dgm.pulse(nm, false);
        dgm.setText(nm, val + '\u00b0');
        var lbl = dgm.svg.querySelector('[data-anglabel="' + nm + '"]');
        if (lbl) { lbl.style.fill = '#5B6470'; lbl.style.fontStyle = 'italic'; }
        stepHost.hidden = true;
        redrawCurrent();
        save();
      });
      doRow.appendChild(add);
      var cancel = el('button', 'btn-pencil', 'Cancel');
      cancel.type = 'button';
      cancel.addEventListener('click', function () { dgm.pulse(nm, false); stepHost.hidden = true; });
      doRow.appendChild(cancel);
      stepHost.appendChild(doRow);
      stepHost.scrollIntoView({ block: 'nearest', behavior: REDUCED ? 'auto' : 'smooth' });
    }

    /* \u2500\u2500 shared render / save / check \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    var msgEl = el('p', 'ui-msg');
    body.insertBefore(msgEl, checkRow);
    var msgTimer = null;
    function flashMsg(t) {
      msgEl.textContent = t;
      clearTimeout(msgTimer);
      msgTimer = setTimeout(function () { msgEl.textContent = ''; }, 5000);
    }

    function redrawCurrent() {
      linesEl.innerHTML = '';
      // prior attempts, struck through
      rec.att.forEach(function (att) {
        (att.L || []).forEach(function (l) { renderLine(l, { cls: 'struck' }); });
        (att.steps || []).forEach(function (s) { renderStepLine(s, { cls: 'struck' }); });
      });
      if (!isAngles && q.start && !rec.lock) renderLine({ op: 'start', t: q.start }, { cls: 'pencil' });
      cur.L.forEach(function (l) { renderLine(l, {}); });
      cur.steps.forEach(function (s) { renderStepLine(s, {}); });
      var ready = isAngles ? !!established[q.target] : cur.L.length > 0;
      checkBtn.disabled = !ready || rec.lock;
      attemptNote.textContent = rec.att.length === 1 ? 'Second attempt \u2014 your first try stays on the page.' : '';
    }

    function save() {
      var attRec = { L: cur.L, dur: Math.round((Date.now() - cur.t0) / 1000) };
      if (isAngles) { attRec = { steps: cur.steps, dur: attRec.dur }; }
      var attts = rec.att.slice();
      // the open attempt is represented live so the teacher's Wall shows "working now"
      var live = { att: attts.concat(cur.L.length || cur.steps.length ? [attRec] : []), lock: rec.lock, ovr: rec.ovr || null };
      if (rec.fin) live.fin = rec.fin;
      hooks.onSave(q.id, rec.lock ? rec : live);
    }

    function runCheck() {
      if (checkBtn.disabled) return;
      checkBtn.disabled = true;
      var attempt = isAngles
        ? { steps: cur.steps, dur: Math.round((Date.now() - cur.t0) / 1000) }
        : { L: cur.L, fin: cur.L.length ? cur.L[cur.L.length - 1].t : '', dur: Math.round((Date.now() - cur.t0) / 1000) };
      var verdict;
      try {
        verdict = isAngles ? window.GJ_ANGLES.checkSteps(q, cur.steps) : window.GJ_MATH.checkQuestion(q, attempt);
      } catch (e) {
        flashMsg('Something went wrong marking this \u2014 your working is saved for your teacher.');
        checkBtn.disabled = false;
        return;
      }
      attempt.res = verdict.res;
      rec.att.push(attempt);

      var rows = linesEl.querySelectorAll('.wline:not(.struck):not(.pencil)');
      var per = verdict.perLine || verdict.perStep || [];
      var seq = Promise.resolve();
      per.forEach(function (v, i) {
        var row = rows[i];
        if (!row) return;
        seq = seq.then(function () {
          var kind = v.ok === 1 ? 'tick' : v.ok === 2 ? 'tick-hollow' : 'cross';
          if (verdict.res === 'AMBER' && v.ok === 1) kind = 'tick-amber';
          if (v.ok === 0) { row.classList.add('err-box'); row.querySelector('.wl-eq').classList.add('wavy'); }
          if (v.ok === 2) row.classList.add('ft-grey');
          return drawMark(row.querySelector('.wl-mark'), kind).then(function () {
            return new Promise(function (r) { setTimeout(r, REDUCED ? 0 : 90); });
          });
        });
      });

      seq.then(function () {
        feedback.innerHTML = '';
        var mk = verdict.mk, mkMax = verdict.mkMax || q.marks;
        var tally = el('div', 'mk-tally', 'M ' + mk[0] + '/' + mkMax[0] + ' \u00b7 A ' + mk[1] + '/' + mkMax[1]);
        feedback.appendChild(tally);
        var done = verdict.res === 'OK';
        var amber = verdict.res === 'AMBER';
        var secondGone = rec.att.length >= 2;

        if (amber) feedback.appendChild(el('p', 'amber-note', 'Right answer \u2014 but no working shown, so the method marks stay on the table.'));

        var bucket = done ? 'perfect' : amber ? 'amber' : secondGone ? 'fail' : 'partial';
        if (done && mk[0] === mkMax[0]) bucket = 'perfect';
        feedback.appendChild(el('p', 'mk-comment', commentFor(q.id, bucket)));

        if (done && !isAngles) {
          var lastRow = rows[rows.length - 1];
          if (lastRow) {
            var eqSpan = lastRow.querySelector('.wl-eq');
            var hold = el('span', 'answer-boxed');
            eqSpan.parentNode.insertBefore(hold, eqSpan);
            hold.appendChild(eqSpan);
            var w = hold.offsetWidth + 20, h = hold.offsetHeight + 6;
            var s = sv('svg', { class: 'box-draw', viewBox: '0 0 ' + w + ' ' + h });
            var p = sv('path', { d: 'M2 2 H ' + (w - 2) + ' V ' + (h - 2) + ' H 2 Z' });
            s.appendChild(p);
            hold.appendChild(s);
            if (!REDUCED) {
              var len = p.getTotalLength();
              p.style.strokeDasharray = len; p.style.strokeDashoffset = len;
              p.getBoundingClientRect();
              p.style.transition = 'stroke-dashoffset 500ms linear';
              p.style.strokeDashoffset = 0;
            }
          }
        }

        if (done || amber || secondGone) {
          rec.lock = true;
          rec.fin = attempt.fin || null;
          rec.mk = mk;
          ui.innerHTML = '';
          checkRow.hidden = true;
          margin.innerHTML = 'Q' + hooks.number + '<div class="mk-tally" style="font-size:18px">' + (mk[0] + mk[1]) + '/' + (mkMax[0] + mkMax[1]) + '</div>';
        } else {
          // one more attempt: keep attempt 1 on the page, struck through
          feedback.appendChild(el('p', 'ui-msg', 'The line in the red box is where it went wrong \u2014 nothing is given away. One more attempt.'));
          cur = { L: [], steps: [], t0: Date.now() };
          established = {};
          if (isAngles) {
            Object.keys(q.diagram.angles).forEach(function (nm) {
              var d = q.diagram.angles[nm];
              if (!d.given) { dgm.setText(nm, d.label || ''); var lb = dgm.svg.querySelector('[data-anglabel="' + nm + '"]'); if (lb) { lb.style.fill = '#14213A'; lb.style.fontStyle = d.label ? 'italic' : ''; } }
            });
          }
          setTimeout(function () { redrawCurrent(); checkBtn.disabled = true; }, REDUCED ? 0 : 600);
        }
        save();
      });
    }

    checkBtn.addEventListener('click', runCheck);

    /* \u2500\u2500 restore saved state \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    if (rec.lock) {
      // render final attempt with its marks, locked
      var finalAtt = rec.att[rec.att.length - 1];
      rec.att.slice(0, -1).forEach(function (att) {
        (att.L || []).forEach(function (l) { renderLine(l, { cls: 'struck' }); });
        (att.steps || []).forEach(function (s) { renderStepLine(s, { cls: 'struck' }); });
      });
      var verdict = null;
      try {
        verdict = isAngles ? window.GJ_ANGLES.checkSteps(q, finalAtt.steps || []) : window.GJ_MATH.checkQuestion(q, finalAtt);
      } catch (e) {}
      var per = (verdict && (verdict.perLine || verdict.perStep)) || [];
      (finalAtt.L || []).forEach(function (l, i) {
        var r = renderLine(l, {});
        var v = per[i];
        if (v) drawMark(r.mark, v.ok === 1 ? (verdict.res === 'AMBER' ? 'tick-amber' : 'tick') : v.ok === 2 ? 'tick-hollow' : 'cross');
        if (v && v.ok === 0) { r.row.classList.add('err-box'); }
      });
      (finalAtt.steps || []).forEach(function (s, i) {
        var r = renderStepLine(s, {});
        var v = per[i];
        if (v) drawMark(r.mark, (v.val === 1 && v.rsn === 1) ? 'tick' : (v.val === 2 ? 'tick-hollow' : (v.val === 1 || v.rsn === 1) ? 'tick-amber' : 'cross'));
        if (s.ang && q.diagram.angles[s.ang]) { dgm.setText(s.ang, s.val + '\u00b0'); }
      });
      if (verdict) {
        var mkMax2 = verdict.mkMax || q.marks;
        margin.innerHTML = 'Q' + hooks.number + '<div class="mk-tally" style="font-size:18px">' + (verdict.mk[0] + verdict.mk[1]) + '/' + (mkMax2[0] + mkMax2[1]) + '</div>';
        feedback.appendChild(el('div', 'mk-tally', 'M ' + verdict.mk[0] + '/' + mkMax2[0] + ' \u00b7 A ' + verdict.mk[1] + '/' + mkMax2[1]));
      }
      checkRow.hidden = true;
    } else {
      // resume an open attempt if one was mid-flight
      if (rec.att.length && !rec.att[rec.att.length - 1].res) {
        var open = rec.att.pop();
        cur.L = open.L || [];
        cur.steps = open.steps || [];
        cur.steps.forEach(function (s) {
          established[s.ang] = true;
          if (dgm) { dgm.setText(s.ang, s.val + '\u00b0'); }
        });
      }
      if (isAngles) buildAnglesUI(); else buildAlgebraUI();
      redrawCurrent();
    }

    return { qid: q.id };
  }

  window.GJ_JOTTER = { mount: mount };
})();

</script>
<script>
/* The Glass Jotter \u2014 the teacher's markbook.
   Passcode-gated (server-side validated). Views: classes (create/delete,
   per-class activity tickboxes, link/QR) \u2192 Working Wall (live class grid,
   20 s poll) \u2192 Jotter Page drill-down (override: the teacher's judgement
   wins everywhere) \u2192 Marking Pile (misconception clusters + starter mode)
   \u2192 Same-Question Sweep. The app pre-marks; the teacher is the marker. */
(function () {
  'use strict';

  function el(tag, cls, html) {
    var d = document.createElement(tag);
    if (cls) d.className = cls;
    if (html != null) d.innerHTML = html;
    return d;
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  function pretty(s) { return String(s).replace(/-/g, '\u2212').replace(/\*/g, '\u00d7'); }

  /* A prominent pulsing GOLD wait-card, swapped into a .ui-msg element while a
     server round-trip runs (the OLS login-gated standard - bland grey text is
     not enough on a board). clearBusy restores plain text. html may contain
     entities; escape any pupil/class names yourself. */
  function busyCard(elm, html) {
    if (!elm) return;
    if (elm.getAttribute('data-base') === null) elm.setAttribute('data-base', elm.className);
    elm.className = 'panel-loading';
    elm.innerHTML = '<span class="panel-spinner" aria-hidden="true"></span><span>' + html + '</span>';
  }
  function clearBusy(elm, text) {
    if (!elm) return;
    var base = elm.getAttribute('data-base');
    elm.className = (base !== null) ? base : elm.className.replace(/\bpanel-loading\b/g, '').trim();
    elm.textContent = text || '';
  }
  /* Two-tap confirm dialog (mirrors showQr): a gj-modal above the panel.
     Never native confirm() - it is unreliable in the sandboxed iframe. */
  function openConfirm(title, bodyText, okLabel, cb) {
    var mroot = document.getElementById('gj-modal-root');
    if (mroot && mroot.children.length) return;   // never stack two dialogs
    var back = el('div', 'gj-modal-backdrop gj-modal-zstack');
    var card = el('div', 'gj-modal');
    card.innerHTML = '<h2>' + esc(title) + '</h2><p class="ui-msg">' + esc(bodyText) + '</p>' +
      '<div class="gj-confirm-actions"><button class="btn-pencil" id="gj-cf-cancel">Cancel</button>' +
      '<button class="btn-stamp" id="gj-cf-ok">' + esc(okLabel || 'Confirm') + '</button></div>';
    back.appendChild(card);
    mroot.appendChild(back);
    function done(v) { back.remove(); if (cb) cb(v); }
    card.querySelector('#gj-cf-ok').addEventListener('click', function () { done(true); });
    card.querySelector('#gj-cf-cancel').addEventListener('click', function () { done(false); });
    back.addEventListener('click', function (e) { if (e.target === back) done(false); });
    card.querySelector('#gj-cf-ok').focus();
  }

  var root = document.getElementById('scr-staff');
  var passcode = null;
  var classes = [];
  var view = { cls: null, act: 'angles', wallTimer: null, wallSeq: 0, wallData: null };

  function call(sub, extra) {
    var p = { passcode: passcode, sub: sub };
    Object.keys(extra || {}).forEach(function (k) { p[k] = extra[k]; });
    return window.GJ.app.call('admin', p);
  }

  /* clipboard: navigator.clipboard \u2192 execCommand textarea \u2192 show the text */
  function copyText(text, msgEl, okMsg) {
    function done() { if (msgEl) msgEl.textContent = okMsg || 'Copied.'; }
    function legacy() {
      var ta = document.createElement('textarea');
      ta.value = text; ta.setAttribute('readonly', '');
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta); ta.select();
      var ok = false;
      try { ok = document.execCommand('copy'); } catch (e) {}
      ta.remove();
      if (ok) done(); else if (msgEl) msgEl.textContent = 'Copy this by hand: ' + text;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done, legacy);
    else legacy();
  }

  function classLink(name) {
    var base = (window.GJ.app.boot.baseUrl) ||
      (location.origin + location.pathname);
    return base + (base.indexOf('?') === -1 ? '?' : '&') + 'class=' + encodeURIComponent(name);
  }

  function stopPolling() { clearInterval(view.wallTimer); view.wallTimer = null; }

  function shell(title, bodyEl, backFn) {
    stopPolling();
    root.innerHTML = '';
    var head = el('div', 'staff-head');
    if (backFn) {
      var back = el('button', 'btn-pencil btn-back', '&larr; Back');
      back.addEventListener('click', backFn);
      head.appendChild(back);
    }
    head.appendChild(el('h1', '', esc(title)));
    var closeB = el('button', 'btn-pencil btn-back', 'Close markbook');
    closeB.style.marginLeft = 'auto';
    closeB.addEventListener('click', function () {
      stopPolling();
      window.GJ.app.showScreen('cover');
    });
    head.appendChild(closeB);
    root.appendChild(head);
    var main = el('div', 'staff-main');
    main.appendChild(bodyEl);
    root.appendChild(main);
    window.GJ.app.showScreen('staff');
    window.scrollTo(0, 0);
  }

  /* \u2550\u2550\u2550 gate \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  function open() {
    if (passcode) { showClasses(); return; }
    var body = el('div', '');
    body.innerHTML =
      '<p class="ui-msg">The markbook is for staff. Enter the department passcode.</p>' +
      '<div class="check-row"><input id="st-pass" type="password" autocomplete="off" ' +
      'style="font-family:var(--f-stationery);font-size:15px;padding:10px;border:1.5px solid var(--navy);border-radius:4px;max-width:240px" ' +
      'aria-label="Staff passcode" />' +
      '<button id="st-go" class="btn-stamp">Open the markbook</button></div>' +
      '<p id="st-msg" class="ui-msg" role="alert"></p>';
    shell('The Markbook', body, null);
    var go = body.querySelector('#st-go');
    function unlock() {
      if (go.disabled) return;
      go.disabled = true;
      busyCard(body.querySelector('#st-msg'), 'Checking the passcode&hellip; this can take a moment');
      var tryPass = body.querySelector('#st-pass').value;
      passcode = tryPass;
      call('classes').then(function (r) {
        go.disabled = false;
        if (!r || !r.ok) {
          passcode = null;
          clearBusy(body.querySelector('#st-msg'), (r && r.error) || 'That passcode was not accepted.');
          return;
        }
        classes = r.classes || [];
        showClasses();
      }).catch(function () {
        go.disabled = false; passcode = null;
        clearBusy(body.querySelector('#st-msg'), 'Could not reach the server \u2014 try again.');
      });
    }
    go.addEventListener('click', unlock);
    body.querySelector('#st-pass').addEventListener('keydown', function (e) { if (e.key === 'Enter') unlock(); });
    body.querySelector('#st-pass').focus();
  }

  /* \u2550\u2550\u2550 classes \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  function reloadClasses() {
    return call('classes').then(function (r) {
      if (r && r.ok) classes = r.classes || [];
    });
  }

  function showClasses() {
    var body = el('div', '');
    body.innerHTML =
      '<div class="check-row" style="margin-bottom:var(--sq)">' +
      '<input id="st-newclass" type="text" maxlength="40" placeholder="e.g. 10B Maths" ' +
      'style="font-family:var(--f-stationery);font-size:15px;padding:10px;border:1.5px solid var(--navy);border-radius:4px;max-width:240px" aria-label="New class name" />' +
      '<button id="st-add" class="btn-stamp">Add a class</button>' +
      '<span id="st-cmsg" class="ui-msg" role="status"></span></div>' +
      '<table class="ledger"><thead><tr><th>Class</th><th>Pupils</th><th>Books on the shelf</th><th></th></tr></thead>' +
      '<tbody id="st-rows"></tbody></table>' +
      '<p class="ui-msg" style="margin-top:var(--sq)">Tick a book to put it on that class\u2019s shelf. Pupils see ticked books only.</p>';
    shell('The Markbook \u00b7 Classes', body, null);
    var rows = body.querySelector('#st-rows');
    var cmsg = body.querySelector('#st-cmsg');

    function render() {
      rows.innerHTML = '';
      if (!classes.length) {
        rows.innerHTML = '<tr><td colspan="4" class="ui-msg">No classes yet \u2014 add your first class above, then share its link with the pupils.</td></tr>';
      }
      classes.forEach(function (c) {
        var tr = document.createElement('tr');
        var ticks = el('td', '');
        var tickWrap = el('div', 'acts-ticks');
        window.GJ.app.activities.forEach(function (a) {
          var lab = el('label', 'tickbox');
          var cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = !!(c.acts && c.acts[a.id]);
          cb.addEventListener('change', function () {
            var acts = {};
            window.GJ.app.activities.forEach(function (a2) { acts[a2.id] = a2.id === a.id ? cb.checked : !!(c.acts && c.acts[a2.id]); });
            cb.disabled = true;
            call('setActs', { className: c.name, acts: acts }).then(function (r) {
              cb.disabled = false;
              if (r && r.ok) { c.acts = acts; cmsg.textContent = a.title + (cb.checked ? ' is now on ' : ' removed from ') + c.name + '\u2019s shelf.'; }
              else { cb.checked = !cb.checked; cmsg.textContent = (r && r.error) || 'Could not save that.'; }
            }).catch(function () { cb.disabled = false; cb.checked = !cb.checked; cmsg.textContent = 'Could not save that.'; });
          });
          lab.appendChild(cb);
          lab.appendChild(document.createTextNode(a.title));
          tickWrap.appendChild(lab);
        });
        ticks.appendChild(tickWrap);

        var actions = el('td', '');
        var wallB = el('button', 'btn-pencil', 'Working Wall');
        wallB.addEventListener('click', function () { view.cls = c.name; showWall(); });
        var linkB = el('button', 'btn-pencil', 'Copy link');
        linkB.style.marginLeft = '6px';
        linkB.addEventListener('click', function () { copyText(classLink(c.name), cmsg, 'Link for ' + c.name + ' copied.'); });
        var qrB = el('button', 'btn-pencil', 'QR');
        qrB.style.marginLeft = '6px';
        qrB.addEventListener('click', function () { showQr(c.name); });
        var delB = el('button', 'btn-pencil', '&times;');
        delB.setAttribute('aria-label', 'Delete ' + c.name);
        delB.style.marginLeft = '6px';
        delB.addEventListener('click', function () {
          openConfirm('Delete ' + c.name + '?',
            'This deletes ' + c.name + ' and all its work from the markbook. This cannot be undone.',
            'Delete class', function (yes) {
              if (!yes) return;
              delB.disabled = true;
              busyCard(cmsg, 'Deleting ' + esc(c.name) + '&hellip; this can take a moment');
              call('deleteClass', { className: c.name }).then(function (r) {
                if (r && r.ok) { classes = classes.filter(function (x) { return x.name !== c.name; }); render(); clearBusy(cmsg, c.name + ' deleted.'); }
                else { delB.disabled = false; clearBusy(cmsg, (r && r.error) || 'Could not delete.'); }
              }).catch(function () { delB.disabled = false; clearBusy(cmsg, 'Could not reach the server.'); });
            });
        });
        actions.appendChild(wallB); actions.appendChild(linkB); actions.appendChild(qrB); actions.appendChild(delB);

        tr.appendChild(el('td', '', '<b>' + esc(c.name) + '</b>'));
        tr.appendChild(el('td', '', String(c.count || 0)));
        tr.appendChild(ticks);
        tr.appendChild(actions);
        rows.appendChild(tr);
      });
    }
    render();

    var addB = body.querySelector('#st-add');
    addB.addEventListener('click', function () {
      if (addB.disabled) return;
      var nm = body.querySelector('#st-newclass').value.trim();
      if (!nm) { cmsg.textContent = 'Give the class a name first.'; return; }
      addB.disabled = true;
      busyCard(cmsg, 'Adding ' + esc(nm) + '&hellip; this can take a moment');
      call('addClass', { className: nm }).then(function (r) {
        addB.disabled = false;
        if (r && r.ok) {
          classes.push({ name: r.name, acts: r.acts || { angles: true, algebra: true }, count: 0 });
          body.querySelector('#st-newclass').value = '';
          render();
          clearBusy(cmsg, r.name + ' added with both books on its shelf \u2014 untick any you want to hold back, then copy its link.');
          reloadClasses().then(render);
        } else clearBusy(cmsg, (r && r.error) || 'Could not add that class.');
      }).catch(function () { addB.disabled = false; clearBusy(cmsg, 'Could not reach the server.'); });
    });
  }

  function showQr(name) {
    var back = el('div', 'gj-modal-backdrop gj-modal-zstack');
    var card = el('div', 'gj-modal gj-qr');
    card.innerHTML = '<h2>' + esc(name) + '</h2><canvas id="st-qr" width="260" height="260"></canvas>' +
      '<p class="ui-msg" style="word-break:break-all">' + esc(classLink(name)) + '</p>' +
      '<div class="check-row"><button class="btn-stamp" id="st-qr-copy">Copy link</button>' +
      '<button class="btn-pencil" id="st-qr-close">Close</button></div><p class="ui-msg" id="st-qmsg"></p>';
    back.appendChild(card);
    document.getElementById('gj-modal-root').appendChild(back);
    if (window.QRCode && window.QRCode.toCanvas) {
      window.QRCode.toCanvas(card.querySelector('#st-qr'), classLink(name),
        { width: 260, margin: 2, errorCorrectionLevel: 'M', color: { dark: '#1A3A6B', light: '#ffffff' } }, function () {});
    }
    card.querySelector('#st-qr-copy').addEventListener('click', function () {
      copyText(classLink(name), card.querySelector('#st-qmsg'), 'Copied.');
    });
    card.querySelector('#st-qr-close').addEventListener('click', function () { back.remove(); });
    back.addEventListener('click', function (e) { if (e.target === back) back.remove(); });
  }

  /* \u2550\u2550\u2550 shared marking helpers (the staff client re-marks with the
         same engines the pupil used \u2014 one marker, two views) \u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  function questionList(actId) {
    var pack = window.GJ.app.content(actId);
    var out = [];
    pack.sections.forEach(function (sec, si) {
      sec.questions.forEach(function (q, qi) {
        out.push({ q: q, label: 'Ex' + (si + 1) + '.Q' + (qi + 1) });
      });
    });
    return out;
  }
  function markState(actId, state, q) {
    var rec = state && state.qs && state.qs[q.id];
    if (!rec || !rec.att || !rec.att.length) return { st: 'un' };
    var last = rec.att[rec.att.length - 1];
    var verdict = null;
    try {
      if (q.kind === 'classify') {
        var right = last.pick === q.classify;
        verdict = { res: right ? 'OK' : 'X@1', mk: [0, right ? 1 : 0], mkMax: [0, 1], perLine: [] };
      } else if (q.kind === 'protractor') {
        var pok = Math.abs((last.read || 0) - q.value) <= (q.tol || 3);
        verdict = { res: pok ? 'OK' : 'X@1', mk: [0, pok ? 1 : 0], mkMax: [0, 1], perLine: [{ dx: pok ? null : (last.dx || 'MISREAD') }] };
      } else {
        verdict = actId === 'angles' ? window.GJ_ANGLES.checkSteps(q, last.steps || []) : window.GJ_MATH.checkQuestion(q, last);
      }
    } catch (e) { return { st: 'un' }; }
    var out = {
      st: !rec.lock ? 'open' : verdict.res === 'OK' ? 'ok' : verdict.res === 'AMBER' ? 'amber' : 'err',
      verdict: verdict, rec: rec, last: last
    };
    var ov = rec.ovr && rec.ovr.q;
    if (ov === 1) out.st = 'ok';
    if (ov === 0) out.st = 'err';
    if (out.st === 'err' && verdict.res && String(verdict.res).indexOf('X@') === 0) out.errAt = Number(String(verdict.res).slice(2)) || 1;
    var dxs = (verdict.perLine || verdict.perStep || []).map(function (l) { return l.dx; }).filter(Boolean);
    if (dxs.length) out.dx = dxs[0];
    // the offending line itself \u2014 the starter shows the pupil's own slip
    if (out.st === 'err') {
      var lines = last.L || [];
      var firstBad = (verdict.perLine || []).findIndex(function (l) { return l.ok === 0; });
      if (firstBad >= 0 && lines[firstBad]) out.cluster = pretty(lines[firstBad].t);
      var steps = last.steps || [];
      var firstBadS = (verdict.perStep || []).findIndex(function (l) { return l.val === 0 || l.rsn === 0; });
      if (firstBadS >= 0 && steps[firstBadS]) out.cluster = '\u2220' + steps[firstBadS].ang + ' = ' + steps[firstBadS].val + '\u00b0';
      if (q.kind === 'protractor' && last.read != null) out.cluster = 'measured ' + last.read + '\u00b0 (true ' + q.value + '\u00b0)';
    }
    return out;
  }

  var DX_NAMES = {
    EXPAND_PARTIAL: 'Expanded only the first term', EXPAND_SIGN: 'Sign slip when expanding',
    SUB_INSTEAD_DIV: 'Subtracted instead of dividing', DIV_BEFORE_SUB: 'Divided before subtracting',
    SIGN_FLIP_MOVE: 'Sign not flipped moving a term', COLLECT_X_NUM: 'Collected x-terms with numbers',
    NEG_MUL_SIGN: 'Negative \u00d7 negative slip', BOTHSIDES_ONE_SIDE: 'Operated on one side only',
    SWAP_NOFLIP: 'Swapped sides without care', ALT_CORR_SWAP: 'Alternate/corresponding confused',
    COINT_EQUAL: 'Treated interior (U) angles as equal', TRI_SUM_360: 'Used 360\u00b0 in a triangle',
    STRAIGHT_360: 'Used 360\u00b0 on a straight line', VOP_SUPP: 'Mixed up vertically opposite with the straight-line pair',
    WRONG_SCALE: 'Read the wrong protractor scale', MISREAD: 'Misread / misplaced the protractor'
  };

  /* \u2550\u2550\u2550 the Working Wall \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  function showWall() {
    var body = el('div', '');
    var actTabs = el('div', 'check-row');
    window.GJ.app.activities.forEach(function (a) {
      var b = el('button', view.act === a.id ? 'btn-stamp' : 'btn-pencil', a.title);
      b.addEventListener('click', function () { view.act = a.id; showWall(); });
      actTabs.appendChild(b);
    });
    var tools = el('div', 'check-row');
    [['Marking Pile', showPile], ['Same-Question Sweep', showSweep], ['Copy CSV', exportCsv]].forEach(function (t) {
      var b = el('button', 'btn-pencil', t[0]);
      b.addEventListener('click', t[1]);
      tools.appendChild(b);
    });
    var msg = el('p', 'ui-msg', 'Loading the wall\u2026');
    var wall = el('div', 'wall');
    body.appendChild(actTabs); body.appendChild(tools); body.appendChild(msg); body.appendChild(wall);
    shell(view.cls + ' \u00b7 Working Wall', body, function () { showClasses(); });

    var qlist = questionList(view.act);

    function paint(pupils) {
      var now = Math.floor(Date.now() / 1000);
      var t = ['<table><thead><tr><th style="text-align:left">Pupil</th>'];
      qlist.forEach(function (item) { t.push('<th>' + esc(item.label) + '</th>'); });
      t.push('</tr></thead><tbody>');
      pupils.sort(function (a, b) { return (a.name || '').localeCompare(b.name || ''); });
      pupils.forEach(function (p) {
        t.push('<tr><td class="pupil-name">' + esc(p.name || p.email) + '</td>');
        qlist.forEach(function (item) {
          var cell = p.summary && p.summary.qs && p.summary.qs[item.q.id];
          var glyph = '<span class="glyph-un">\u2014</span>', title = 'Untouched';
          if (cell) {
            var st = cell.ovr === 1 ? 'ok' : cell.ovr === 0 ? 'err' : cell.st;
            if (st === 'ok') { glyph = '<span class="glyph-ok">\u2713</span>'; title = 'Method and answer sound'; }
            else if (st === 'amber') { glyph = '<span class="glyph-amber">\u25d0</span>'; title = 'Right answer, working missing'; }
            else if (st === 'err') { glyph = '<span class="glyph-err">\u2717' + (cell.errAt ? '<sub>' + cell.errAt + '</sub>' : '') + '</span>'; title = 'First error at line ' + (cell.errAt || '?') + (cell.dx ? ' \u2014 ' + (DX_NAMES[cell.dx] || cell.dx) : ''); }
            else if (st === 'open') {
              var live = p.summary.upd && (now - p.summary.upd) < 60;
              glyph = '<span class="glyph-live">\u25cf</span>'; title = live ? 'Working right now' : 'In progress';
            }
            if (cell.ovr != null) title += ' \u00b7 teacher override';
          }
          t.push('<td class="cell" data-email="' + esc(p.email) + '" title="' + esc(title) + '">' + glyph + '</td>');
        });
        t.push('</tr>');
      });
      t.push('</tbody></table>');
      // column totals + dominant misconception
      var totals = '<tr><td class="ui-msg">Totals</td>';
      qlist.forEach(function (item) {
        var ok = 0, amber = 0, err = 0, dxCount = {};
        pupils.forEach(function (p) {
          var c = p.summary && p.summary.qs && p.summary.qs[item.q.id];
          if (!c) return;
          var st = c.ovr === 1 ? 'ok' : c.ovr === 0 ? 'err' : c.st;
          if (st === 'ok') ok++; else if (st === 'amber') amber++; else if (st === 'err') { err++; if (c.dx) dxCount[c.dx] = (dxCount[c.dx] || 0) + 1; }
        });
        var topDx = Object.keys(dxCount).sort(function (a, b) { return dxCount[b] - dxCount[a]; })[0];
        totals += '<td class="col-dx">' + ok + '\u2713 ' + (amber ? amber + '\u25d0 ' : '') + (err ? err + '\u2717' : '') +
          (topDx ? '<br>' + esc(DX_NAMES[topDx] || topDx) + ' \u00d7' + dxCount[topDx] : '') + '</td>';
      });
      totals += '</tr>';
      wall.innerHTML = t.join('').replace('</tbody>', totals + '</tbody>');
      wall.querySelectorAll('.cell').forEach(function (td) {
        td.addEventListener('click', function () { showJotterPage(td.getAttribute('data-email')); });
      });
      clearBusy(msg, pupils.length + ' pupils \u00b7 updates every 20 seconds while this page is open \u00b7 tap any cell to open that pupil\u2019s jotter.');
    }

    function load() {
      var token = ++view.wallSeq;
      call('wall', { className: view.cls, act: view.act }).then(function (r) {
        if (token !== view.wallSeq) return;
        if (!r || !r.ok) { clearBusy(msg, (r && r.error) || 'Could not load the wall.'); return; }
        view.wallData = r.pupils || [];
        paint(view.wallData);
      }).catch(function () { if (token === view.wallSeq) clearBusy(msg, 'Could not reach the server \u2014 will retry.'); });
    }
    busyCard(msg, 'Loading the wall&hellip; this can take a moment');
    load();
    stopPolling();
    view.wallTimer = setInterval(load, 20000);
  }

  /* \u2550\u2550\u2550 Jotter Page drill-down + override \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
  function showJotterPage(email) {
    var body = el('div', '');
    var msg = el('p', 'ui-msg', 'Fetching the jotter\u2026');
    body.appendChild(msg);
    var page = el('div', 'jotter');
    body.appendChild(page);
    shell(view.cls + ' \u00b7 Jotter Page', body, function () { showWall(); });

    busyCard(msg, 'Fetching the jotter&hellip; this can take a moment');
    call('jotter', { className: view.cls, act: view.act, email: email }).then(function (r) {
      if (!r || !r.ok) { clearBusy(msg, (r && r.error) || 'Could not load.'); return; }
      var state = null;
      try { state = JSON.parse(r.state); } catch (e) {}
      clearBusy(msg, (r.name || email) + ' \u00b7 ' + (view.act === 'angles' ? 'Angles' : 'Algebra') +
        ' \u00b7 every committed line, attempt 1 struck through where it was retried.');
      if (!state) { page.innerHTML = '<div class="jotter-q"><div class="jq-margin"></div><div class="jq-body ui-msg">Nothing saved yet.</div></div>'; return; }

      questionList(view.act).forEach(function (item) {
        var q = item.q;
        var res = markState(view.act, state, q);
        if (res.st === 'un') return;
        var wrap = el('div', 'jotter-q');
        var marginEl = el('div', 'jq-margin', esc(item.label));
        var bodyEl = el('div', 'jq-body');
        wrap.appendChild(marginEl); wrap.appendChild(bodyEl);
        bodyEl.appendChild(el('p', 'jq-prompt', esc(q.prompt)));

        var rec = res.rec;
        (rec.att || []).slice(0, -1).forEach(function (att) {
          (att.L || []).forEach(function (l) {
            bodyEl.appendChild(el('div', 'wline struck', '<span class="wl-eq">' + esc(pretty(l.t)) + '</span>'));
          });
          (att.steps || []).forEach(function (s) {
            bodyEl.appendChild(el('div', 'wline struck', '<span class="wl-eq">\u2220' + esc(s.ang) + ' = ' + esc(String(s.val)) + '\u00b0</span>'));
          });
        });
        var per = (res.verdict && (res.verdict.perLine || res.verdict.perStep)) || [];
        var last = res.last || {};
        (last.L || []).forEach(function (l, i) {
          var v = per[i] || {};
          var mark = v.ok === 1 ? '<span class="glyph-ok">\u2713</span>' : v.ok === 2 ? '<span class="glyph-ok" style="opacity:.55">\u2713</span>' : v.ok === 0 ? '<span class="glyph-err">\u2717</span>' : '';
          var row = el('div', 'wline' + (v.ok === 0 ? ' err-box' : ''),
            '<span class="wl-mark" style="position:static;width:auto;margin-right:8px">' + mark + '</span>' +
            '<span class="wl-eq">' + esc(pretty(l.t)) + '</span>' +
            (l.op && l.op !== 'rw' && l.op !== 'start' ? '<span class="wl-margin-note">(' + esc(pretty(l.op)) + ')</span>' : '') +
            '<span class="wl-margin-note">' + (l.s ? l.s + 's' : '') + '</span>');
          bodyEl.appendChild(row);
          if (v.ok === 0 && (v.dx || v.note)) bodyEl.appendChild(el('p', 'ui-msg', esc(DX_NAMES[v.dx] || v.note || '')));
        });
        if (last.pick != null) {
          var rightC = last.pick === q.classify;
          bodyEl.appendChild(el('div', 'wline',
            '<span class="' + (rightC ? 'glyph-ok' : 'glyph-err') + '" style="margin-right:8px">' + (rightC ? '\u2713' : '\u2717') + '</span>' +
            '<span class="wl-eq">' + esc(last.pick) + '</span>' +
            (rightC ? '' : '<span class="wl-margin-note">(answer: ' + esc(q.classify) + ')</span>')));
        }
        if (last.read != null) {
          var rightP = Math.abs(last.read - q.value) <= (q.tol || 3);
          bodyEl.appendChild(el('div', 'wline',
            '<span class="' + (rightP ? 'glyph-ok' : 'glyph-err') + '" style="margin-right:8px">' + (rightP ? '\u2713' : '\u2717') + '</span>' +
            '<span class="wl-eq">measured ' + esc(String(last.read)) + '\u00b0</span>' +
            (rightP ? '' : '<span class="wl-margin-note">(true ' + q.value + '\u00b0' + (res.dx === 'WRONG_SCALE' || last.dx === 'WRONG_SCALE' ? ' \u00b7 read the other scale' : '') + ')</span>')));
        }
        (last.steps || []).forEach(function (s, i) {
          var v = per[i] || {};
          var bank = window.GJ.app.content('angles').reasonBank;
          var rsn = bank.filter(function (rr) { return rr.id === s.rsn; })[0];
          var vm = v.val === 1 ? '\u2713' : v.val === 2 ? '(\u2713)' : '\u2717';
          var rm = v.rsn === 1 ? 'reason \u2713' : 'reason \u2717';
          bodyEl.appendChild(el('div', 'wline' + (v.val === 0 ? ' err-box' : ''),
            '<span class="wl-mark" style="position:static;width:auto;margin-right:8px" class="' + (v.val === 1 ? 'glyph-ok' : 'glyph-err') + '">' + vm + '</span>' +
            '<span class="wl-eq">\u2220' + esc(s.ang) + ' = ' + esc(String(s.val)) + '\u00b0' + (s.calc ? ' <span class="wl-margin-note">(' + esc(pretty(s.calc)) + ')</span>' : '') + '</span>' +
            '<span class="wl-margin-note">(' + (rsn ? esc(rsn.text) : '?') + ') \u00b7 ' + rm + (v.preq ? ' \u00b7 route not shown' : '') + '</span>'));
          if (v.dx) bodyEl.appendChild(el('p', 'ui-msg', esc(DX_NAMES[v.dx] || v.dx)));
        });

        if (res.verdict) {
          var mkMax = res.verdict.mkMax || q.marks;
          bodyEl.appendChild(el('p', 'mk-tally', 'M ' + res.verdict.mk[0] + '/' + mkMax[0] + ' \u00b7 A ' + res.verdict.mk[1] + '/' + mkMax[1] +
            (last.dur ? ' \u00b7 ' + last.dur + 's \u00b7 ' + (rec.att.length) + ' attempt' + (rec.att.length > 1 ? 's' : '') : '')));
        }

        /* the override \u2014 the teacher's judgement wins everywhere */
        var ovRow = el('div', 'check-row');
        var ovMsg = el('span', 'ui-msg', rec.ovr ? 'Teacher override applied.' : '');
        function setOvr(val, btn) {
          if (btn.disabled) return;
          btn.disabled = true;
          call('override', { className: view.cls, act: view.act, email: email, q: q.id, idx: 'q', val: val }).then(function (r2) {
            btn.disabled = false;
            if (r2 && r2.ok) { rec.ovr = (val == null) ? null : { q: val }; ovMsg.textContent = (val != null) ? 'Override saved \u2014 the Wall now shows your judgement.' : 'Override cleared.'; }
            else ovMsg.textContent = (r2 && r2.error) || 'Could not save.';
          }).catch(function () { btn.disabled = false; ovMsg.textContent = 'Could not save.'; });
        }
        [['Mark it right', 1], ['Mark it wrong', 0], ['Back to the app\u2019s marking', null]].forEach(function (o) {
          var b = el('button', 'btn-pencil', o[0]);
          b.addEventListener('click', function () { setOvr(o[1], b); });
          ovRow.appendChild(b);
        });
        ovRow.appendChild(ovMsg);
        bodyEl.appendChild(ovRow);
        page.appendChild(wrap);
      });
    });
  }
